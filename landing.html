<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Dashboard</title>
  <link rel="stylesheet" href="landing.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span>S</span>
        <span class="brand-name">AzmiWeb</span>
      </div>
      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Dashboard</a>
        <a href="#">Profile</a>
        <a href="login.html" class="btn-logout">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1>Welcome back!</h1>
      <p class="hero-subtitle">You have successfully logged in to your account.</p>
    </section>

    <section class="cards">
      <div class="card">
        <div class="card-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h3>Analytics</h3>
        <p>View your stats and insights at a glance.</p>
      </div>
      <div class="card">
        <div class="card-icon">
          <i class="fas fa-cog"></i>
        </div>
        <h3>Settings</h3>
        <p>Manage your account and preferences.</p>
      </div>
      <div class="card">
        <div class="card-icon">
          <i class="fas fa-bell"></i>
        </div>
        <h3>Notifications</h3>
        <p>Stay updated with the latest activity.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 AzmiWeb. All rights reserved.</p>
  </footer>
</body>
</html>
